<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Smart Brain — placeholder">
  <defs>
    <radialGradient id="g1" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#2A2823"/>
      <stop offset="100%" stop-color="#0E0E0C"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#g1)"/>

  <!-- Subtle grid -->
  <g stroke="#F2EFEA" opacity="0.06" stroke-width="1">
    <path d="M0 300 H1200 M0 600 H1200 M300 0 V900 M600 0 V900 M900 0 V900"/>
  </g>

  <!-- Sigil: a hand-touched circle suggesting magic + tech -->
  <g transform="translate(600 450)">
    <circle r="220" fill="none" stroke="#F2EFEA" stroke-width="1" opacity="0.3"/>
    <circle r="160" fill="none" stroke="#D4582A" stroke-width="1.5" opacity="0.7"/>
    <circle r="80"  fill="none" stroke="#F2EFEA" stroke-width="1" opacity="0.5"/>
    <circle r="4"   fill="#D4582A"/>
    <line x1="-260" y1="0" x2="-220" y2="0" stroke="#F2EFEA" stroke-width="1" opacity="0.3"/>
    <line x1="220"  y1="0" x2="260"  y2="0" stroke="#F2EFEA" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-260" x2="0" y2="-220" stroke="#F2EFEA" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="220" x2="0" y2="260" stroke="#F2EFEA" stroke-width="1" opacity="0.3"/>
  </g>

  <g font-family="JetBrains Mono, monospace" fill="#F2EFEA" font-size="14" letter-spacing="2" opacity="0.6">
    <text x="40" y="60">CASE 01 · SMART BRAIN</text>
    <text x="40" y="860">Live · Direction artistique · Motion</text>
    <text x="1160" y="60" text-anchor="end">2023–2024</text>
  </g>
</svg>
