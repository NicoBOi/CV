<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Nicolas Sempere — sempere.studio</title>
  <meta name="description" content="Brand engineer hybride. DA, motion, 3D, no-code. Bordeaux + France.">

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

  <!-- Inter Display variable -->
  <link rel="preconnect" href="https://rsms.me" crossorigin>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">

  <link rel="stylesheet" href="/style.css">

  <!-- Smooth scroll + scroll anims (defer pour FCP) -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
  <script defer src="/script.js"></script>
</head>
<body>
  <a class="skip-link" href="#scenes">Aller au contenu</a>
  <main id="scenes" data-scenes>

    <!-- ═══ SCÈNE 1 — HERO ═══ -->
    <section class="scene-hero" data-scene data-theme="dark" aria-label="Six métiers, une personne">
      <div class="scene-hero__stage">
        <span class="scene-hero__word">designer</span>
        <span class="scene-hero__word">motion</span>
        <span class="scene-hero__word">brand</span>
        <span class="scene-hero__word">no-code</span>
        <span class="scene-hero__word">vidéaste</span>
        <span class="scene-hero__word">stratège</span>
        <h1 class="scene-hero__name" aria-hidden="true">sempere</h1>
      </div>
    </section>

    <!-- ═══ SCÈNE 3 — IDENTITÉ ═══ -->
    <section class="scene-identity" data-scene aria-label="Identité">
      <div class="scene-identity__marker" aria-hidden="true">01 / IDENTITÉ</div>
      <h2 class="scene-identity__name">
        <span class="scene-identity__row scene-identity__row--top">Nicolas</span>
        <span class="scene-identity__row scene-identity__row--bottom">Sempere</span>
      </h2>
      <p class="scene-identity__caption">Brand engineer basé à Bordeaux, disponible partout en France</p>
    </section>

    <!-- ═══ SCÈNE 4 — TRANSITION SOMBRE ═══ -->
    <section class="scene-transition" data-scene aria-hidden="true">
      <span class="scene-transition__iris"></span>
    </section>

  </main>
</body>
</html>
